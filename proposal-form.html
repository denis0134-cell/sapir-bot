<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>בנה הצעה | דניס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;--gold2:#E8C96B;
  --bg:#0a0a0a;--card:#111;--card2:#181818;
  --text:#fff;--muted:#888;--border:rgba(201,168,76,0.2);
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px}
.header{background:linear-gradient(135deg,rgba(201,168,76,0.15),transparent);border-bottom:1px solid var(--border);padding:20px;text-align:center}
.header h1{font-size:22px;font-weight:800;color:var(--gold)}
.header p{font-size:13px;color:var(--muted);margin-top:4px}
.form{padding:20px;max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.field{display:flex;flex-direction:column;gap:8px}
label{font-size:13px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
input,select,textarea{background:var(--card2);border:1px solid var(--border);color:var(--text);font-family:'Heebo',sans-serif;font-size:16px;padding:14px 16px;border-radius:12px;width:100%;transition:border-color .2s;outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:none;min-height:80px}
select option{background:#111}
.program-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.prog-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;padding:14px 8px;border-radius:12px;cursor:pointer;transition:all .2s;text-align:center}
.prog-btn.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold)}
.price-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.price-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:13px;font-weight:600;padding:10px 4px;border-radius:10px;cursor:pointer;transition:all .2s;text-align:center}
.price-btn.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold)}
.divider{height:1px;background:var(--border);margin:4px 0}
.optional-label{font-size:12px;color:var(--muted);font-weight:400}
.submit-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-family:'Heebo',sans-serif;font-size:18px;font-weight:800;padding:18px;border-radius:14px;border:none;width:100%;cursor:pointer;margin-top:8px;transition:transform .15s,opacity .15s}
.submit-btn:active{transform:scale(0.98);opacity:0.9}
.result-card{background:var(--card);border:1px solid var(--gold);border-radius:16px;padding:20px;display:none}
.result-card.show{display:block}
.result-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:12px}
.command-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:monospace;font-size:13px;word-break:break-all;margin-bottom:16px;line-height:1.5}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.copy-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;padding:14px;border-radius:12px;cursor:pointer;transition:all .2s}
.wa-btn{background:#25D366;border:none;color:#fff;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;padding:14px;border-radius:12px;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.copy-btn.copied{border-color:var(--gold);color:var(--gold)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.summary-item{background:var(--card2);border-radius:8px;padding:10px 12px}
.summary-item .key{font-size:11px;color:var(--muted);margin-bottom:2px}
.summary-item .val{font-size:14px;font-weight:600}
</style>
</head>
<body>
<div class="header">
  <h1>📋 בנה הצעה ללקוח</h1>
  <p>מלא את הפרטים ← הבוט יבנה הצעה אישית</p>
</div>

<div class="form" id="mainForm">

  <div class="field">
    <label>שם הלקוח</label>
    <input type="text" id="clientName" placeholder="שם פרטי ומשפחה" autocomplete="off">
  </div>

  <div class="field">
    <label>מספר טלפון</label>
    <input type="tel" id="clientPhone" placeholder="05X-XXXXXXX" autocomplete="off">
  </div>

  <div class="field">
    <label>מקצוע / עסק</label>
    <input type="text" id="clientProfession" placeholder="לדוג': מאמן עסקי, יועצת קריירה..." autocomplete="off">
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>מסלול</label>
    <div class="program-grid">
      <button class="prog-btn" data-program="ABM" onclick="selectProgram(this)">ABM<br><small style="font-size:11px;font-weight:400">AI בלבד</small></button>
      <button class="prog-btn" data-program="LDB" onclick="selectProgram(this)">LDB<br><small style="font-size:11px;font-weight:400">ליווי עסקי</small></button>
      <button class="prog-btn active" data-program="ABM+LDB" onclick="selectProgram(this)">שניהם<br><small style="font-size:11px;font-weight:400">הכל ביחד</small></button>
    </div>
  </div>

  <div class="field">
    <label>מחיר</label>
    <div class="price-row">
      <button class="price-btn" data-price="13900" onclick="selectPrice(this)">₪13,900<br><small>ABM</small></button>
      <button class="price-btn" data-price="18900" onclick="selectPrice(this)">₪18,900<br><small>LDB</small></button>
      <button class="price-btn active" data-price="24900" onclick="selectPrice(this)">₪24,900<br><small>שניהם</small></button>
    </div>
    <input type="number" id="customPrice" placeholder="או הכנס מחיר מותאם..." min="0" max="99999" oninput="customPriceChanged(this)">
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>הכנסה נוכחית <span class="optional-label">(אופציונלי)</span></label>
    <input type="text" id="currentRevenue" placeholder="לדוג': 15K, 30,000 ₪..." autocomplete="off">
  </div>

  <div class="field">
    <label>כאב / מטרה עיקרית <span class="optional-label">(אופציונלי)</span></label>
    <textarea id="mainGoal" placeholder="מה הלקוח רצה לפתור? מה המטרה העיקרית שלו?"></textarea>
  </div>

  <button class="submit-btn" onclick="buildProposal()">📅 בנה הצעה ←</button>

  <div class="result-card" id="resultCard">
    <div class="result-title">✅ ההצעה מוכנה — שלח לבוט:</div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="command-box" id="commandBox"></div>
    <div class="action-row">
      <button class="copy-btn" id="copyBtn" onclick="copyCommand()">📋 העתק</button>
      <a class="wa-btn" id="waBtn" href="#" onclick="openWhatsApp()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        שלח לבוט
      </a>
    </div>
  </div>

</div>

<script>
let selectedProgram = 'ABM+LDB';
let selectedPrice = '24900';

function selectProgram(btn) {
  document.querySelectorAll('.prog-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedProgram = btn.dataset.program;
}

function selectPrice(btn) {
  document.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedPrice = btn.dataset.price;
  document.getElementById('customPrice').value = '';
}

function customPriceChanged(input) {
  if (input.value) {
    document.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
    selectedPrice = input.value;
  }
}

function normalizePhone(raw) {
  const digits = raw.replace(/\D/g, '');
  if (digits.startsWith('972')) return digits;
  if (digits.startsWith('0')) return '972' + digits.slice(1);
  if (digits.startsWith('5') && digits.length === 9) return '972' + digits;
  return digits;
}

function formatPriceDisplay(p) {
  return parseInt(p).toLocaleString('he-IL');
}

let currentCommand = '';

function buildProposal() {
  const name = document.getElementById('clientName').value.trim();
  const phoneRaw = document.getElementById('clientPhone').value.trim();
  const profession = document.getElementById('clientProfession').value.trim();
  const revenue = document.getElementById('currentRevenue').value.trim();
  const goal = document.getElementById('mainGoal').value.trim();

  if (!name) { alert('נא למלא שם לקוח'); return; }
  if (!phoneRaw) { alert('נא למלא מספר טלפון'); return; }

  const phone = normalizePhone(phoneRaw);
  const price = document.getElementById('customPrice').value || selectedPrice;

  // Build extended command
  let cmd = `הצעה | ${phone} | ${selectedProgram} | ${price}`;
  if (name) cmd += ` | name=${name}`;
  if (profession) cmd += ` | prof=${profession}`;
  if (revenue) cmd += ` | rev=${revenue}`;
  if (goal) cmd += ` | goal=${goal.substring(0, 50)}`;

  currentCommand = cmd;

  // Update summary
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = `
    <div class="summary-item"><div class="key">שם</div><div class="val">${name}</div></div>
    <div class="summary-item"><div class="key">מסלול</div><div class="val">${selectedProgram}</div></div>
    <div class="summary-item"><div class="key">טלפון</div><div class="val">${phone}</div></div>
    <div class="summary-item"><div class="key">מחיר</div><div class="val">₪${formatPriceDisplay(price)}</div></div>
  `;

  document.getElementById('commandBox').textContent = cmd;

  const resultCard = document.getElementById('resultCard');
  resultCard.classList.add('show');
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyCommand() {
  navigator.clipboard.writeText(currentCommand).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ הועתק!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 העתק'; btn.classList.remove('copied'); }, 2000);
  });
}

function openWhatsApp() {
  const botNumber = '15556676573';
  const encoded = encodeURIComponent(currentCommand);
  window.open(`https://wa.me/${botNumber}?text=${encoded}`, '_blank');
}
</script>
</body>
</html>
